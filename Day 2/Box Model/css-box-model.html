<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
        .box{
            width:200px;
            height:100px;
            background-color:lightblue; /* Content Area */
            color:brown; /* Content Text Color */
            padding:40px; /* Inside Space */
            border:5px solid blue; /* Border */
            margin:50px; /* Outside Space */
        }
    </style>
</head>
<body>
    <h2> Box Model Demo</h2>
    <div class="box">Sathwik</div>
</body>
</html>
