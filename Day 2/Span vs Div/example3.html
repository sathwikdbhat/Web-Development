<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Using both Span & Div together</title>
    <style>
        .card{
            border:1px solid #ccc;
            border-radius:8px;
            padding:16px;
        }
        .badge{
            background: lightgreen;
            color:darkgreen;
            padding:2px 8px;
            border-radius:8px;
        }
        .Price{
            font-weight:800;
            color:darkred;
            font-size:18px;
        }
    </style>
</head>
<body>
    <div class="card">
        <p>Status: <span class="badge">Active</span></p>
        <p>Price: <span class="Price">₹499</span></p>
    </div>
</body>
</html>
