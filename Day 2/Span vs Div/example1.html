<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Span vs Div Example 1</title>
    <style>
        body{
            background-color: aqua;
        }
    </style>
</head>
<body>
    <div style="background: #e6f1fb; padding: 15px;">I am a div. I will take up the full width.</div>
    <div style="background: greenyellow; padding: 15px; margin-top: 10px;">I am a div. I start on a new line.</div>
</body>
</html>
