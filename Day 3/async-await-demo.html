<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async | Await demo | Using JavaScript</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: rgb(211, 218, 155);

        }
        h2{
            color: rgb(151, 10, 17);
        }
        button{
            padding: 10px 25px;
            margin: 5px;
            cursor: pointer;
            border: none;
            background-color: rgb(151, 10, 17);
            color: white;
        }
        button:hover{
            opacity: 0.8;
        }
        p{
            font-size: 18px;
            padding: 8px;
        }
        #a{
            color: rgb(255, 0, 0);

        }
        #b{
            color: rgb(0, 128, 0);
        }
    </style>
</head>
<body>
    <h2>Pizza Demo🍕</h2>
    <button onclick="start()">Start demo</button>
    <button onclick="alert('Playing soothin music by arijith singh')">Play some music</button>
    <p id="a" >Person A : Idle</p>
    <p id="b" >Person B : Idle</p>
    <script>
        function orderPizza(){
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve("Pizza is ready");
                }, 10000);
            });
        }
        async function personA(){
            let a=document.getElementById("a");
            a.innerText="Person A : Waiting for pizza";
            a.style.color="orange";
            let result=await orderPizza();
            a.innerText="Person A : "+result;
            a.style.color="green";
        }
        function personB(){
            let b=document.getElementById("b");
            b.innerText="Person B : Watching the TV 📺";
            b.style.color="#2196f3";
        }
        function start(){
            personA();
            personB();
        }
    </script>
</body>
</html>
