<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Based Background Changer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1 id="status">How are you feeling?</h1>
        <div class="btn-group">
            <button onclick="changeMood('happy')">😁 Happy</button>
            <button onclick="changeMood('sad')">😢 Sad</button>
            <button onclick="changeMood('angry')">😡 Angry</button>
            <button onclick="changeMood('relaxed')">😌 Relaxed</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
