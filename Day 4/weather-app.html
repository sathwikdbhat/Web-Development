<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App Using OpenWeatherMap API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4 text-center" style="width: 320px">
        <h4 class="mb-3">⛅ Weather App</h4>
        <div class="input-group mb-3">
            <input type="text" id="city" class="form-control"placeholder="Enter city name" aria-label="City name">
            <button class="btn btn-primary" onclick="getWeather()">Search</button>
        </div>
        <h5 id="result" class="mb-5">-----</h5>
        <small id="time" class="text-muted"></small>
    </div>
    <script>
        let apiKey="23b9cc437ca1deef8d365dfbc7816011";
        async function getWeather(){
            let city=document.getElementById("city").value;
            if (city===""){
                document.getElementById("result").innerText="Please enter a city name.";
                return;
            }
            let url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;
            try{
                let res=await fetch(url);
                let data=await res.json();  // {Key : Value}
                if (data.cod != 200){
                    document.getElementById("city").innerText="City not found. Please try again.";
                    return;
                }
                // Conditions
                let condtion=data.weather[0].main;
                let icon="⛅";
                if (condtion=="Clear"){
                    icon="☀️";
                } else if (condtion=="Clouds"){
                    icon="☁️";
                } else if (condtion=="Rain"){
                    icon="🌧️";
                } else if (condtion=="Snow"){
                    icon="❄️";
                }
                else if (condtion=="Thunderstorm"){
                    icon="⛈️";
                }
                // Display the weather information
                document.getElementById("result").innerText= icon + " " + data.name + ": " + data.main.temp + "°C";
                // Display the current time
                let now = new Date();
                document.getElementById("time").innerText = now.toLocaleTimeString();
                } catch (e){
                    document.getElementById("result").innerText="Error fetching weather data. Please try again.";
            }
        }

        function updateTime(){
            let now = new Date();
            let options = {
                timeZone: "Asia/Kolkata",
                weekday: "short",
                day : "numeric",
                month : "short",
                hour : "2-digit",
                minute : "2-digit",
            };
            document.getElementById("time").innerText = now.toLocaleString("en-US", options);
        }
        setInterval(updateTime, 1000);
        updateTime(); // Initial call to display time immediately
    </script>
</body>
</html>
